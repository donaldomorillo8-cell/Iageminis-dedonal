<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura IA</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23a8c0ff'/%3E%3Cstop offset='50%25' stop-color='%239b51e0'/%3E%3Cstop offset='100%25' stop-color='%23e91e63'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z' fill='none' stroke='url(%23g)' stroke-width='6' opacity='0.4'/%3E%3Cpath d='M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z' fill='none' stroke='url(%23g)' stroke-width='5' stroke-dasharray='4 2'/%3E%3Ccircle cx='50' cy='50' r='12' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23ffffff'/%3E%3C/svg%3E">

    <style>
        :root {
            --bg-color: #212121;
            --sidebar-bg: #171717;
            --text-color: #ececec;
            --text-muted: #b4b4b4;
            --input-bg: #2f2f2f;
            --border-color: #424242;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Lateral izquierdo */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            z-index: 10;
        }

        .top-sidebar .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-weight: 500;
            transition: background 0.2s;
        }

        .top-sidebar .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .brand-logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            margin-top: 24px;
            padding-left: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-logo span { 
            background: linear-gradient(45deg, #a8c0ff, #9b51e0, #e91e63); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
            color: transparent;
            font-weight: bold; 
        }

        .aura-logo-svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0px 0px 4px rgba(155, 81, 224, 0.6));
        }
        
        .sidebar-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        /* Área de Chat */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            background-color: var(--bg-color);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 0 20px;
        }

        .chat-row {
            display: flex;
            gap: 16px;
            width: 100%;
            padding: 4px 0;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .chat-row.user .avatar {
            background-color: #ab68ff;
            color: white;
        }

        .chat-row.bot .avatar {
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            padding: 2px;
        }

        .message-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .sender-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
            white-space: pre-wrap;
        }

        .chat-image-preview {
            max-width: 280px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid var(--border-color);
            display: block;
            object-fit: cover;
        }

        .thinking-text {
            color: var(--text-muted);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Barra de entrada de texto */
        .input-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 24px 20px;
            background: linear-gradient(transparent, var(--bg-color) 20%);
        }

        .input-box-wrapper {
            width: 100%;
            max-width: 680px;
            background-color: var(--input-bg);
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .input-main-row {
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 10px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .plus-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: background 0.2s, color 0.2s;
        }
        .plus-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
        }

        .send-btn {
            background: #ffffff;
            border: none;
            color: #000000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .send-btn:hover {
            opacity: 0.8;
        }

        /* Barra de previsualización de imagen adjuntada */
        .bar-preview-container {
            display: none;
            padding: 0 0 10px 0;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .bar-preview-wrapper {
            position: relative;
            display: inline-block;
        }
        .bar-preview-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .remove-preview-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #171717;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="top-sidebar">
            <button class="new-chat-btn" onclick="clearChat()">Nuevo chat <span>📝</span></button>
            
            <div class="brand-logo">
                <svg class="aura-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a8c0ff" />
                            <stop offset="50%" stop-color="#9b51e0" />
                            <stop offset="100%" stop-color="#e91e63" />
                        </linearGradient>
                    </defs>
                    <path d="M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z" fill="none" stroke="url(#auraGrad)" stroke-width="6" opacity="0.4"/>
                    <path d="M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z" fill="none" stroke="url(#auraGrad)" stroke-width="5" stroke-dasharray="4 2"/>
                    <circle cx="50" cy="50" r="12" fill="url(#auraGrad)" />
                    <circle cx="50" cy="50" r="4" fill="#ffffff" />
                </svg>
                <span>Aura</span> IA
            </div>
        </div>
        <div class="sidebar-footer">Desarrollado por Donaldo Ysaias Soto Morillo</div>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="chat-wrapper" id="chatWrapper">
                <div class="chat-row bot">
                    <div class="avatar">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                            <defs>
                                <linearGradient id="avatarGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#a8c0ff" />
                                    <stop offset="50%" stop-color="#9b51e0" />
                                    <stop offset="100%" stop-color="#e91e63" />
                                </linearGradient>
                            </defs>
                            <path d="M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z" fill="none" stroke="url(#avatarGrad1)" stroke-width="8" opacity="0.4"/>
                            <path d="M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z" fill="none" stroke="url(#avatarGrad1)" stroke-width="7" stroke-dasharray="4 2"/>
                            <circle cx="50" cy="50" r="14" fill="url(#avatarGrad1)" />
                            <circle cx="50" cy="50" r="5" fill="#ffffff" />
                        </svg>
                    </div>
                    <div class="message-content-wrapper">
                        <div class="sender-name">Aura IA</div>
                        <div class="message-text" id="welcome-msg">¡Hola! Soy Aura IA. Estoy lista para responder tus preguntas y analizar tus imágenes de forma totalmente libre. ¿En qué te puedo colaborar hoy?</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box-wrapper">
                <div class="bar-preview-container" id="barPreview">
                    <div class="bar-preview-wrapper">
                        <img src="" class="bar-preview-img" id="previewImg">
                        <button class="remove-preview-btn" onclick="clearSelectedImage()">✕</button>
                    </div>
                </div>
                <div class="input-main-row">
                    <button class="plus-btn" id="plusBtn" onclick="document.getElementById('fileInput').click()">＋</button>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <input type="text" id="userInput" placeholder="Pregúntale lo que deseas a Aura IA..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedImageBase64 = "";

        function generateAuraLogoHtml() {
            const uniqueGradId = 'grad-' + Math.random().toString(36).substr(2, 9);
            return `
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
                    <defs>
                        <linearGradient id="${uniqueGradId}" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a8c0ff" />
                            <stop offset="50%" stop-color="#9b51e0" />
                            <stop offset="100%" stop-color="#e91e63" />
                        </linearGradient>
                    </defs>
                    <path d="M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z" fill="none" stroke="url(#${uniqueGradId})" stroke-width="8" opacity="0.4"/>
                    <path d="M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z" fill="none" stroke="url(#${uniqueGradId})" stroke-width="7" stroke-dasharray="4 2"/>
                    <circle cx="50" cy="50" r="14" fill="url(#${uniqueGradId})" />
                    <circle cx="50" cy="50" r="5" fill="#ffffff" />
                </svg>
            `;
        }

        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                document.getElementById('previewImg').src = selectedImageBase64;
                document.getElementById('barPreview').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });

        function clearSelectedImage() {
            selectedImageBase64 = "";
            fileInput.value = "";
            document.getElementById('barPreview').style.display = 'none';
            document.getElementById('previewImg').src = "";
        }

        async function sendMessage() {
            const inputElement = document.getElementById('userInput');
            const messageText = inputElement.value.trim();
            
            if (messageText === '' && !selectedImageBase64) return;

            const imageToAppend = selectedImageBase64;
            
            // Fuerza el rol a ser exclusivamente de Usuario ('user' -> "Tú")
            appendMessage(messageText, 'user', false, imageToAppend);
            
            inputElement.value = '';
            clearSelectedImage();

            // Fuerza la espera a ser de Aura IA ('bot' -> "Aura IA")
            const thinkingId = appendMessage('Aura está procesando tu solicitud...', 'bot', true);

            try {
                const response = await fetch("/api/chat", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: messageText,
                        image: imageToAppend
                    })
                });

                const data = await response.json();

                if (data.reply) {
                    updateMessage(thinkingId, data.reply);
                } else {
                    updateMessage(thinkingId, data.error || "Error al procesar la solicitud.");
                }
            } catch (error) {
                updateMessage(thinkingId, "Hubo un error al conectar con Aura IA.");
            }
        }

        function appendMessage(text, sender, isThinking = false, imageSrc = "") {
            const chatWrapper = document.getElementById('chatWrapper');
            const rowDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now() + Math.random().toString(36).substr(2, 4);
            
            rowDiv.className = `chat-row ${sender}`;
            
            // Validación estricta: si es 'user' es 'Tú', si no es 'Aura IA'
            const avatarContent = (sender === 'user') ? 'U' : generateAuraLogoHtml();
            const senderName = (sender === 'user') ? 'Tú' : 'Aura IA';
            
            let imageHtml = "";
            if (imageSrc) { 
                imageHtml = `<img src="${imageSrc}" class="chat-image-preview">`; 
            }

            rowDiv.innerHTML = `
                <div class="avatar">${avatarContent}</div>
                <div class="message-content-wrapper">
                    <div class="sender-name">${senderName}</div>
                    <div class="message-text ${isThinking ? 'thinking-text' : ''}" id="${uniqueId}"></div>
                    ${imageHtml}
                </div>
            `;
            
            chatWrapper.appendChild(rowDiv);
            
            // Se inserta usando .innerText para que no se interpreten marcas raras de la IA como HTML
            document.getElementById(uniqueId).innerText = text;
            
            const chatContainer = document.querySelector('.chat-container');
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return uniqueId;
        }

        function updateMessage(id, newText) {
            const msgElement = document.getElementById(id);
            if (msgElement) {
                msgElement.classList.remove('thinking-text');
                msgElement.innerText = newText;
                const chatContainer = document.querySelector('.chat-container');
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
        
        function clearChat() {
            document.getElementById('chatWrapper').innerHTML = `
                <div class="chat-row bot">
                    <div class="avatar">${generateAuraLogoHtml()}</div>
                    <div class="message-content-wrapper">
                        <div class="sender-name">Aura IA</div>
                        <div class="message-text">Nuevo chat iniciado. ¿En qué te puede ayudar Aura IA hoy?</div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
