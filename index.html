<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura IA</title>
    
    <!-- AQUÍ SE QUITA LA CARPETICA VACÍA Y SE PONE TU LOGO EN LA PESTAÑA -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23a8c0ff'/%3E%3Cstop offset='50%25' stop-color='%239b51e0'/%3E%3Cstop offset='100%25' stop-color='%23e91e63'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z' fill='none' stroke='url(%23g)' stroke-width='6' opacity='0.4'/%3E%3Cpath d='M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z' fill='none' stroke='url(%23g)' stroke-width='5' stroke-dasharray='4 2'/%3E%3Ccircle cx='50' cy='50' r='12' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='50' r='4' fill='%23ffffff'/%3E%3C/svg%3E">

    <style>
        :root {
            --bg-color: #212121;
            --sidebar-bg: #171717;
            --text-color: #ececec;
            --text-muted: #b4b4b4;
            --input-bg: #2f2f2f;
            --border-color: #424242;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Lateral - Estilo ChatGPT */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            z-index: 10;
        }

        .top-sidebar .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-weight: 500;
            transition: background 0.2s;
        }

        .top-sidebar .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Contenedor del Logo de Aura */
        .brand-logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-color);
            margin-top: 24px;
            padding-left: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .brand-logo span { 
            background: linear-gradient(45deg, #a8c0ff, #9b51e0, #e91e63); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
            color: transparent;
            font-weight: bold; 
        }

        /* Estilos para el Icono SVG del Logo */
        .aura-logo-svg {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0px 0px 4px rgba(155, 81, 224, 0.6));
        }
        
        .sidebar-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        /* Área Principal de Chat */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            background-color: var(--bg-color);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 0 20px;
        }

        /* Estructura de Mensajes ChatGPT */
        .chat-row {
            display: flex;
            gap: 16px;
            width: 100%;
            padding: 4px 0;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .chat-row.user .avatar {
            background-color: #ab68ff;
            color: white;
        }

        .chat-row.bot .avatar {
            background-color: #10a37f;
            color: white;
        }

        .message-content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .sender-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .message-text {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
            white-space: pre-wrap;
        }

        .chat-image-preview {
            max-width: 280px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid var(--border-color);
            display: block;
            object-fit: cover;
        }

        .thinking-text {
            color: var(--text-muted);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Barra de Entrada Flotante - Estilo ChatGPT */
        .input-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 24px 20px;
            background: linear-gradient(transparent, var(--bg-color) 20%);
        }

        .input-box-wrapper {
            width: 100%;
            max-width: 680px;
            background-color: var(--input-bg);
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .input-main-row {
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 10px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* Botón de Adjuntar Estilo ChatGPT (+) */
        .plus-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: background 0.2s, color 0.2s;
        }
        .plus-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
        }

        /* Botón Enviar Estilo ChatGPT */
        .send-btn {
            background: #ffffff;
            border: none;
            color: #000000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .send-btn:hover {
            opacity: 0.8;
        }

        /* Vista previa dentro de la barra de texto */
        .bar-preview-container {
            display: none;
            padding: 0 0 10px 0;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .bar-preview-wrapper {
            position: relative;
            display: inline-block;
        }
        .bar-preview-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .remove-preview-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #171717;
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal API Key */
        .key-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .key-modal-content {
            background: var(--sidebar-bg);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .key-modal h3 { margin-bottom: 12px; color: #fff; }
        .key-modal p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; }
        .key-modal input {
            width: 100%; padding: 12px; border-radius: 8px;
            background: var(--bg-color); border: 1px solid var(--border-color);
            color: #fff; margin-bottom: 20px; outline: none;
        }
        .key-modal button {
            background: #10a37f; color: #fff; border: none;
            padding: 10px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="keyModal" class="key-modal" style="display: none;">
        <div class="key-modal-content">
            <h3>Falta tu API Key de Groq</h3>
            <p>Introduce tu clave privada de Groq (gsk_...) para poder usar Aura IA.</p>
            <input type="text" id="modalKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx">
            <button onclick="saveApiKey()">Guardar Clave</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="top-sidebar">
            <button class="new-chat-btn" onclick="clearChat()">Nuevo chat <span>📝</span></button>
            
            <div class="brand-logo">
                <svg class="aura-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a8c0ff" />
                            <stop offset="50%" stop-color="#9b51e0" />
                            <stop offset="100%" stop-color="#e91e63" />
                        </linearGradient>
                    </defs>
                    <path d="M50 15 C65 15, 85 35, 85 50 C85 65, 65 85, 50 85 C35 85, 15 65, 15 50 C15 35, 35 15, 50 15 Z" fill="none" stroke="url(#auraGrad)" stroke-width="6" opacity="0.4"/>
                    <path d="M50 25 C75 10, 90 40, 75 60 C60 80, 40 90, 25 75 C10 60, 20 30, 50 25 Z" fill="none" stroke="url(#auraGrad)" stroke-width="5" stroke-dasharray="4 2"/>
                    <circle cx="50" cy="50" r="12" fill="url(#auraGrad)" />
                    <circle cx="50" cy="50" r="4" fill="#ffffff" />
                </svg>
                <span>Aura</span> IA
            </div>
            
        </div>
        <div class="sidebar-footer">Desarrollado por X_DONALDFRUISTS</div>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="chat-wrapper" id="chatWrapper">
                <div class="chat-row bot">
                    <div class="avatar">AI</div>
                    <div class="message-content-wrapper">
                        <div class="sender-name">Aura IA</div>
                        <div class="message-text">¡Hola! Soy Aura IA. Estoy lista para responder tus preguntas y analizar tus imágenes. ¿En qué te puedo colaborar hoy?</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box-wrapper">
                
                <div class="bar-preview-container" id="barPreview">
                    <div class="bar-preview-wrapper">
                        <img src="" class="bar-preview-img" id="previewImg">
                        <button class="remove-preview-btn" onclick="clearSelectedImage()">✕</button>
                    </div>
                </div>

                <div class="input-main-row">
                    <button class="plus-btn" id="plusBtn" onclick="document.getElementById('fileInput').click()">＋</button>
                    
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    
                    <input type="text" id="userInput" placeholder="Pregúntale lo que deseas a Aura IA..." onkeypress="handleKeyPress(event)">
                    
                    <button class="send-btn" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GROQ_API_KEY = localStorage.getItem('groq_api_key') || "";
        let selectedImageBase64 = "";

        if (!GROQ_API_KEY) {
            document.getElementById('keyModal').style.display = 'flex';
        }

        function saveApiKey() {
            const keyValue = document.getElementById('modalKeyInput').value.trim();
            if (keyValue.startsWith('gsk_')) {
                localStorage.setItem('groq_api_key', keyValue);
                GROQ_API_KEY = keyValue;
                document.getElementById('keyModal').style.display = 'none';
            } else {
                alert("Por favor ingresa una clave válida de Groq.");
            }
        }

        const fileInput = document.getElementById('fileInput');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                document.getElementById('previewImg').src = selectedImageBase64;
                document.getElementById('barPreview').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        });

        function clearSelectedImage() {
            selectedImageBase64 = "";
            fileInput.value = "";
            document.getElementById('barPreview').style.display = 'none';
            document.getElementById('previewImg').src = "";
        }

        async function sendMessage() {
            const inputElement = document.getElementById('userInput');
            const messageText = inputElement.value.trim();
            
            if (messageText === '' && !selectedImageBase64) return;
            if (!GROQ_API_KEY) return;

            const imageToAppend = selectedImageBase64;

            appendMessage(messageText, 'user', false, imageToAppend);
            
            inputElement.value = '';
            clearSelectedImage();

            const thinkingId = appendMessage('Aura está procesando tu solicitud...', 'bot', true);

            try {
                let requestBody = {};

                if (imageToAppend) {
                    requestBody = {
                        model: "llama-3.2-11b-vision-preview",
                        messages: [
                            { 
                                role: "system", 
                                content: "Eres Aura IA, un asistente avanzado de inteligencia artificial con capacidades completas de visión. Analiza detalladamente lo que el usuario adjunte y responde directamente con seguridad." 
                            },
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: messageText || "Analiza esta imagen detalladamente." },
                                    { type: "image_url", image_url: { url: imageToAppend } }
                                ]
                            }
                        ]
                    };
                } else {
                    requestBody = {
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Eres Aura IA, un asistente virtual útil, inteligente y directo." },
                            { role: "user", content: messageText }
                        ]
                    };
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (data.choices && data.choices[0].message) {
                    let botResponse = data.choices[0].message.content;
                    botResponse = botResponse.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');
                    updateMessage(thinkingId, botResponse);
                } else {
                    updateMessage(thinkingId, "Error al procesar la solicitud. Verifica el estado de tu clave.");
                }
            } catch (error) {
                updateMessage(thinkingId, "Hubo un error al conectar con Aura IA.");
            }
        }

        function appendMessage(text, sender, isThinking = false, imageSrc = "") {
            const chatWrapper = document.getElementById('chatWrapper');
            const rowDiv = document.createElement('div');
            const uniqueId = 'msg-' + Date.now();
            rowDiv.className = `chat-row ${sender}`;
            
            const avatarTxt = (sender === 'user') ? 'U' : 'AI';
            const senderName = (sender === 'user') ? 'Tú' : 'Aura IA';
            
            let imageHtml = "";
            if (imageSrc) {
                imageHtml = `<img src="${imageSrc}" class="chat-image-preview">`;
            }

            rowDiv.innerHTML = `
                <div class="avatar">${avatarTxt}</div>
                <div class="message-content-wrapper">
                    <div class="sender-name">${senderName}</div>
                    <div class="message-text ${isThinking ? 'thinking-text' : ''}" id="${uniqueId}">${text}</div>
                    ${imageHtml}
                </div>
            `;
            
            chatWrapper.appendChild(rowDiv);
            document.querySelector('.chat-container').scrollTop = document.querySelector('.chat-container').scrollHeight;
            return uniqueId;
        }

        function updateMessage(id, newText) {
            const msgElement = document.getElementById(id);
            if (msgElement) {
                msgElement.classList.remove('thinking-text');
                msgElement.innerText = newText;
                document.querySelector('.chat-container').scrollTop = document.querySelector('.chat-container').scrollHeight;
            }
        }

        function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
        
        function clearChat() {
            document.getElementById('chatWrapper').innerHTML = `
                <div class="chat-row bot">
                    <div class="avatar">AI</div>
                    <div class="message-content-wrapper">
                        <div class="sender-name">Aura IA</div>
                        <div class="message-text">Nuevo chat iniciado. ¿En qué te puede ayudar Aura IA hoy?</div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
