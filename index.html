<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA // Quantum Nexus</title>
    <style>
        :root {
            --bg-deep: #050505;
            --panel-bg: #0a0a0c;
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --text-glow: 0 0 15px rgba(0, 242, 255, 0.3);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-deep); 
            color: #d1d1d1; 
            font-family: var(--font-main); 
            height: 100vh; 
            overflow: hidden; 
            display: grid;
            grid-template-columns: 260px 1fr 300px;
        }

        /* Paneles Laterales de Datos */
        .sidebar { 
            background: var(--panel-bg); 
            border-right: 1px solid #1a1a1a; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
        }

        .data-card { 
            background: #111; 
            border: 1px solid #222; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 0.8rem; 
        }

        /* Área Central de Chat */
        .main-stage { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: radial-gradient(circle at bottom right, #0a0a10, #050505);
        }

        #chat-stream { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        }

        .bubble { 
            max-width: 800px; 
            padding: 25px; 
            border-radius: 12px; 
            position: relative; 
            animation: emerge 0.6s ease-out;
        }
        .bubble.user { align-self: flex-end; background: #16161a; border: 1px solid #2a2a35; }
        .bubble.aura { align-self: flex-start; background: #0d0d12; border-left: 4px solid var(--accent-cyan); box-shadow: var(--text-glow); }

        /* Barra de Entrada Estilo Dashboard */
        .input-dock { 
            padding: 30px; 
            background: rgba(10, 10, 12, 0.9); 
            border-top: 1px solid #222; 
        }
        .input-wrapper { 
            max-width: 900px; 
            margin: 0 auto; 
            display: flex; 
            background: #16161a; 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 5px; 
        }
        input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 18px 25px; 
            color: #fff; 
            font-size: 1rem; 
            outline: none; 
        }
        button { 
            background: var(--accent-cyan); 
            color: #000; 
            border: none; 
            padding: 0 30px; 
            border-radius: 8px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
        }

        @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo Scrollbar Industrial */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h3 style="color: var(--accent-cyan);">AURA CORE</h3>
        <div class="data-card">
            <h4>NODO NEURAL</h4>
            <p>Estado: Estabilizado</p>
        </div>
        <div class="data-card">
            <h4>LATENCIA I/O</h4>
            <p>12.4ms</p>
        </div>
    </aside>

    <main class="main-stage">
        <div id="chat-stream">
            <div class="bubble aura"><strong>AURA:</strong> Interfaz cuántica en línea. ¿Qué comando desea ejecutar en el núcleo?</div>
        </div>
        <div class="input-dock">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ingresar parámetros de consulta...">
                <button onclick="enviar()">Transmitir</button>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <h3 style="color: var(--accent-purple);">MÉTRICAS</h3>
        <div class="data-card">
            <h4>MEMORIA</h4>
            <p>Buffer 4096 tokens</p>
        </div>
    </aside>

    <script>
        const API_KEY = "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";

        async function enviar() {
            const input = document.getElementById('userInput');
            const stream = document.getElementById('chat-stream');
            if (!input.value) return;

            stream.innerHTML += `<div class="bubble user">${input.value}</div>`;
            const q = input.value;
            input.value = "";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: q }]
                    })
                });
                const data = await res.json();
                stream.innerHTML += `<div class="bubble aura">${data.choices[0].message.content}</div>`;
                stream.scrollTop = stream.scrollHeight;
            } catch(e) {
                stream.innerHTML += `<div class="bubble aura" style="border-left-color:red">Error de enlace cuántico.</div>`;
            }
        }
    </script>
</body>
</html>
